name: bff-ci

on:
  push:
    paths:
      - "services/lemusic_bff/**"
      - ".github/workflows/bff-ci.yml"
  pull_request:
    paths:
      - "services/lemusic_bff/**"
      - ".github/workflows/bff-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/lemusic_bff
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/lemusic_bff/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

