name: lemusic
description: LeMusic cross-platform music player (Android + Windows/macOS).
publish_to: "none"

version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # networking / utils
  http: ^1.2.2
  url_launcher: ^6.3.0

  # playback & background (Android)
  just_audio: ^0.9.39
  audio_service: ^0.18.15

  # embedded web player (e.g., Kugou mini-player H5)
  webview_flutter: ^4.8.0

  # local storage (MVP: local playlists)
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

